<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>025 - The Old Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }

  .canvas {
    width: 1000px;
    height: 440px;
    background: #0e0e10;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 58px 70px 58px 70px;
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  .uptime-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: #8a8a92;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .uptime-label .num {
    color: #b4b4bc;
    font-weight: 500;
  }

  .uptime-label .sep {
    margin: 0 14px;
    color: #3a3a42;
  }

  .line-wrap {
    margin-bottom: 20px;
    display: block;
  }

  .flat-line {
    display: block;
    width: 860px;
    height: 12px;
  }

  .signals {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: #8a8a92;
    text-transform: uppercase;
    display: flex;
    align-items: baseline;
  }

  .signals .stat {
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
  }

  .signals .zero {
    color: #b4b4bc;
    font-weight: 500;
  }

  .signals .divider {
    margin: 0 24px;
    color: #3a3a42;
  }

  .quote {
    margin-top: auto;
    margin-bottom: 4px;
  }

  .setup {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: #8a8a92;
    letter-spacing: -0.005em;
    margin-bottom: 12px;
  }

  .payoff {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1.22;
    color: #dcdce0;
    letter-spacing: -0.015em;
  }

  .footer {
    position: absolute;
    bottom: 24px;
    right: 70px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.34em;
    color: #4a4a52;
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="content">
      <div class="uptime-label">
        UPTIME<span class="sep">·</span><span class="num">99.98%</span><span class="sep">·</span><span class="num">3</span> YEARS QUIET
      </div>

      <div class="line-wrap">
        <svg class="flat-line" viewBox="0 0 860 12" xmlns="http://www.w3.org/2000/svg">
          <line x1="2" y1="8" x2="788" y2="8" stroke="#7a9e7e" stroke-width="2" stroke-linecap="square"/>
          <polyline points="788,8 812,8 830,6 848,3 858,2" fill="none" stroke="#7a9e7e" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
        </svg>
      </div>

      <div class="signals">
        <span class="stat">ISSUES <span class="zero">0</span></span>
        <span class="divider">·</span>
        <span class="stat">PRS <span class="zero">0</span></span>
        <span class="divider">·</span>
        <span class="stat">STARS THIS MONTH <span class="zero">0</span></span>
      </div>

      <div class="quote">
        <div class="setup">Most underrated kind of shipping:</div>
        <div class="payoff">the thing that never needed<br>a second version.</div>
      </div>
    </div>
    <div class="footer">QUIET INFRASTRUCTURE</div>
  </div>
</body>
</html>
