<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>028 - The Design Decision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }

  .canvas {
    width: 1000px;
    height: 440px;
    background: #0e0e10;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .stage {
    position: absolute;
    top: 78px;
    left: 72px;
    right: 72px;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 140px;
    z-index: 2;
  }

  .item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
  }

  /* Cheap button: default Bootstrap/LinkedIn energy -- sharp, saturated, uppercase */
  .btn-cheap {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    background: #1e6feb;
    padding: 9px 20px;
    border: none;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Considered button: rounded, breathing, sentence-case, harmonized with canvas */
  .btn-right {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #e5e5e8;
    background: #1a1a1e;
    padding: 13px 30px;
    border: 1px solid #2e2e34;
    border-radius: 10px;
    letter-spacing: -0.005em;
  }

  .micro-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: #7a7a82;
    text-transform: uppercase;
  }

  .item.right .micro-label {
    color: #7a9e7e;
  }

  .rule {
    position: absolute;
    left: 50%;
    top: 92px;
    height: 122px;
    width: 1px;
    background: #2a2a30;
    z-index: 2;
  }

  .payoff {
    position: absolute;
    bottom: 86px;
    left: 72px;
    right: 72px;
    z-index: 2;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 500;
    line-height: 1.26;
    color: #dcdce0;
    letter-spacing: -0.015em;
  }

  .payoff .accent {
    color: #7a9e7e;
  }

  .footer {
    position: absolute;
    bottom: 24px;
    right: 72px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.34em;
    color: #4a4a52;
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="stage">
      <div class="item left">
        <button class="btn-cheap">Submit</button>
        <div class="micro-label">works</div>
      </div>
      <div class="item right">
        <button class="btn-right">Submit</button>
        <div class="micro-label">feels right</div>
      </div>
    </div>

    <div class="rule"></div>

    <div class="payoff">
      Taste isn't a credential.<br>
      It's a <span class="accent">habit of noticing.</span>
    </div>
    <div class="footer">THE DESIGN DECISION</div>
  </div>
</body>
</html>
