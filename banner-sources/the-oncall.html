<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>030 - The Oncall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050507;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .canvas {
    width: 1000px;
    height: 440px;
    background: #0e0e10;
    position: relative;
    overflow: hidden;
    padding: 48px 76px;
  }

  .grain {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: #7a9e90;
    position: relative;
  }

  .top-rule {
    height: 1px;
    background: #2a3a36;
    margin: 14px 0 30px;
    position: relative;
  }

  .meta {
    display: flex;
    gap: 88px;
    margin-bottom: 8px;
    position: relative;
  }

  .meta-field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .meta-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #808088;
  }

  .meta-value {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 400;
    color: #d0d0d4;
  }

  .items {
    padding: 28px 0 24px;
    position: relative;
  }

  .item-primary {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: #d0d0d4;
    margin-bottom: 12px;
  }

  .item-sub {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #9a9aa2;
    padding-left: 22px;
    line-height: 1.7;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 16px;
    border-top: 1px solid #4a6a64;
    position: relative;
  }

  .due-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #7a9e90;
    letter-spacing: 0.02em;
  }

  .due-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #b8ccba;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="grain"></div>

    <div class="wordmark">Statement</div>
    <div class="top-rule"></div>

    <div class="meta">
      <div class="meta-field">
        <div class="meta-label">Bill from</div>
        <div class="meta-value">past you</div>
      </div>
      <div class="meta-field">
        <div class="meta-label">Bill to</div>
        <div class="meta-value">you</div>
      </div>
    </div>

    <div class="items">
      <div class="item-primary">deploy shipped 6 months ago</div>
      <div class="item-sub">integration test skipped</div>
      <div class="item-sub">metric not graphed</div>
      <div class="item-sub">error not caught</div>
    </div>

    <div class="total-row">
      <div class="due-label">Due now</div>
      <div class="due-amount">one night</div>
    </div>
  </div>
</body>
</html>
